# Nginx configuration for Course Teaching Agent frontend
# Supports SSE streaming and SPA routing

# Docker embedded DNS resolver — enables runtime hostname resolution
# so Nginx doesn't fail at startup if the backend isn't ready yet
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name localhost;

    # Static files (built Vue app)
    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (matching backend MAX_UPLOAD_SIZE: 50MB)
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # API proxy — use a variable to defer resolution to request time
    location /api/ {
        set $backend_upstream "http://backend:8000";
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support: disable buffering for streaming endpoints
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Ensure chunked encoding works for SSE
        chunked_transfer_encoding on;
    }

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
