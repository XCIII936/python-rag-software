services:
  # ── Milvus Dependencies ──
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus-etcd:/etcd
    networks:
      - course-network
    command: >
      etcd
      --advertise-client-urls http://0.0.0.0:2379
      --listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd

  milvus-minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus-minio:/minio_data
    networks:
      - course-network
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.14
    container_name: milvus-standalone
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus-data:/var/lib/milvus
    networks:
      - course-network
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio
    command: ["milvus", "run", "standalone"]

  # ── Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: course-backend
    environment:
      - DATABASE_URL=sqlite:///./course_teaching_agent.db
      - SECRET_KEY=course-agent-secret-change-in-production
      # API Key — 用 DASHSCOPE_API_KEY（bash/WSL 不支持带 - 的变量名）
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - LLM_MODEL=qwen3-max
      - EMBEDDING_MODEL=text-embedding-v3
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - DEBUG=false
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/course_teaching_agent.db:/app/course_teaching_agent.db
      - ./course_materials:/app/course_materials
    networks:
      - course-network
    ports:
      - "8000:8000"
    depends_on:
      - milvus
    restart: unless-stopped

  # ── Frontend (Nginx serving built Vue app + proxy) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: course-frontend
    networks:
      - course-network
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  milvus-etcd:
  milvus-minio:
  milvus-data:
  backend-data:
  backend-db:

networks:
  course-network:
    driver: bridge
